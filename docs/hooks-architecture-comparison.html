<html lang="en">
<head>
<meta charset="UTF-8">

<title>Lifecycle Hooks Architecture — Approach Comparison</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;

    --border: #2a3a5c;
    --text: #e0e0e0;
    --text-dim: #8892a8;
    --accent: #4fc3f7;
    --accent2: #81c784;
    --accent3: #ffb74d;
    --red: #ef5350;
    --purple: #b39ddb;
    --pink: #f48fb1;
    --conn-direct: #4fc3f7;
    --conn-event: #81c784;
    --conn-config: #ffb74d;
    --conn-shell: #f48fb1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
  .approach-tabs {
    display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px;
  }
  .approach-tab {
    padding: 8px 20px; border: none; background: transparent; color: var(--text-dim);
    font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .approach-tab.active { background: var(--bg3); color: var(--accent); }
  .approach-tab:hover:not(.active) { color: var(--text); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 280px; flex-shrink: 0; background: var(--bg2);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 16px;
  }
  .sidebar h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 10px; margin-top: 16px;
  }
  .sidebar h3:first-child { margin-top: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
  .legend-swatch { width: 32px; height: 4px; border-radius: 2px; flex-shrink: 0; }
  .legend-swatch.dashed {
    background: repeating-linear-gradient(90deg, var(--swatch-color) 0 6px, transparent 6px 10px);
  }
  .legend-node {
    width: 16px; height: 16px; border-radius: 4px; border: 2px solid; flex-shrink: 0;
  }
  .pro-con { font-size: 12px; line-height: 1.6; padding: 4px 0; }
  .pro-con .pro { color: var(--accent2); display: block; padding: 2px 0; }
  .pro-con .con { color: var(--red); display: block; padding: 2px 0; }
  .file-list { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; line-height: 1.8; }
  .file-list .new { color: var(--accent2); }
  .file-list .modified { color: var(--accent3); }
  .file-list .existing { color: var(--text-dim); }
  .pro-con .note { color: var(--text-dim); display: block; padding: 2px 0; }
  .summary-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; margin-top: 8px; font-size: 12px; line-height: 1.5; color: var(--text-dim);
  }
  .canvas-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-container { flex: 1; overflow: auto; padding: 20px; }
  svg { display: block; width: 100%; height: 100%; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .prompt-bar {
    background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 20px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .prompt-text {
    flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .copy-btn {
    padding: 6px 14px; background: var(--bg3); border: 1px solid var(--border);
    color: var(--accent); font-size: 12px; border-radius: 4px; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--border); }
  .tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px; font-size: 12px; line-height: 1.5;
    max-width: 320px; pointer-events: none; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none;
  }
  .tooltip .tt-title { font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .tooltip .tt-file { font-family: monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .tooltip .tt-body { color: var(--text); }
</style>
</head>

      '+ New events useful beyond just hooks',
      '+ AgentLoop internals mostly unchanged',
      '+ Any consumer can observe lifecycle',
    ],
    cons: [
      '\u2212 Larger change surface (4+ files modified)',
      '\u2212 ToolCallEvent lacks tool_input dict \u2014 needs change',
      '\u2212 ToolResultEvent lacks tool_input \u2014 observer must track state',
      '\u2212 Every consumer (programmatic, TUI) must wrap',
      '\u2212 Reviewers may say "over-scoped for hooks"',
      '\u2212 pre_tool_use fires at wrong time (before approval)',
    ],
    files: [
      { name: 'core/hooks.py', status: 'new' },
      { name: 'core/config/_settings.py', status: 'modified' },
      { name: 'core/agent_loop.py', status: 'modified' },
      { name: 'core/types.py', status: 'modified' },
      { name: 'core/programmatic.py', status: 'modified' },
      { name: 'cli/textual_ui/app.py', status: 'modified' },
    ],
    diffSize: '~200 lines new, ~40 lines modified',
  }
};

const COLORS = {
  direct: '#4fc3f7', event: '#81c784', config: '#ffb74d',
  shell: '#f48fb1', existing: '#6b7280',
};

const NODE_FILLS = {
  existing: { fill: '#1a2744', stroke: '#3a5070' },
  modified: { fill: '#2a2a18', stroke: '#6a6a30' },
  new: { fill: '#1a3028', stroke: '#30705a' },
  event: { fill: '#1e1a3a', stroke: '#5a4a8a' },
};

function getCenter(n) { return { x: n.x + n.w / 2, y: n.y + n.h / 2 }; }

function getEdgePoint(from, to) {
  const fc = getCenter(from), tc = getCenter(to);
  const dx = tc.x - fc.x, dy = tc.y - fc.y;
  const angle = Math.atan2(dy, dx);
  let fx, fy, hw = from.w / 2, hh = from.h / 2;
  if (Math.abs(Math.cos(angle)) * hh > Math.abs(Math.sin(angle)) * hw) {
    fx = fc.x + Math.sign(dx) * hw; fy = fc.y + Math.tan(angle) * Math.sign(dx) * hw;
  } else {
    fy = fc.y + Math.sign(dy) * hh; fx = fc.x + (1 / Math.tan(angle)) * Math.sign(dy) * hh;
  }
  let tx, ty, tw = to.w / 2, th = to.h / 2;
  const ra = angle + Math.PI;
  if (Math.abs(Math.cos(ra)) * th > Math.abs(Math.sin(ra)) * tw) {
    tx = tc.x + Math.sign(-dx) * tw; ty = tc.y + Math.tan(ra) * Math.sign(-dx) * tw;
  } else {
    ty = tc.y + Math.sign(-dy) * th; tx = tc.x + (1 / Math.tan(ra)) * Math.sign(-dy) * th;
  }
  return { fx, fy, tx, ty };
}

function buildSVG(nodes, conns) {
  const svg = document.getElementById('diagram');
  var vb = state.approach === 'current' ? '0 0 900 590' : state.approach === 'direct' ? '0 0 980 610' : '0 0 980 620';
  svg.setAttribute('viewBox', vb);

  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  for (const [type, color] of Object.entries(COLORS)) {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'arrow-' + type);
    marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '6');
    marker.setAttribute('refX', '7'); marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 8 3, 0 6'); poly.setAttribute('fill', color);
    marker.appendChild(poly); defs.appendChild(marker);
  }
  svg.appendChild(defs);

  // Connections
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  for (const conn of conns) {
    const from = nodeMap[conn.from], to = nodeMap[conn.to];
    if (!from || !to) continue;
    const { fx, fy, tx, ty } = getEdgePoint(from, to);
    const color = COLORS[conn.type] || COLORS.existing;
    const dash = conn.type === 'event' ? '6,3' : conn.type === 'existing' ? '3,3' : 'none';
    const cx1 = fx + (tx - fx) * 0.3, cy1 = fy;
    const cx2 = fx + (tx - fx) * 0.7, cy2 = ty;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + fx + ',' + fy + ' C' + cx1 + ',' + cy1 + ' ' + cx2 + ',' + cy2 + ' ' + tx + ',' + ty);
    path.setAttribute('fill', 'none'); path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5'); path.setAttribute('opacity', '0.7');
    if (dash !== 'none') path.setAttribute('stroke-dasharray', dash);
    path.setAttribute('marker-end', 'url(#arrow-' + conn.type + ')');
    svg.appendChild(path);

    if (conn.label) {
      const lx = fx + (tx - fx) * 0.5, ly = fy + (ty - fy) * 0.5 - 6;
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', String(lx)); txt.setAttribute('y', String(ly));
      txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('fill', color);
      txt.setAttribute('font-size', '9'); txt.setAttribute('opacity', '0.8');
      txt.textContent = conn.label;
      svg.appendChild(txt);
    }
  }

  // Nodes
  for (const node of nodes) {
    const style = NODE_FILLS[node.type] || NODE_FILLS.existing;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.dataset.id = node.id;
    g.addEventListener('mouseenter', function(e) { showTip(e, node); });
    g.addEventListener('mouseleave', hideTip);
    g.style.cursor = 'pointer';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(node.x)); rect.setAttribute('y', String(node.y));
    rect.setAttribute('width', String(node.w)); rect.setAttribute('height', String(node.h));
    rect.setAttribute('rx', '6'); rect.setAttribute('fill', style.fill);
    rect.setAttribute('stroke', style.stroke); rect.setAttribute('stroke-width', '1.5');
    g.appendChild(rect);

    const lines = node.label.split('\n');
    if (lines.length > 1) {
      const baseY = node.y + node.h / 2 - (lines.length - 1) * 7;
      lines.forEach(function(line, i) {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', String(node.x + node.w / 2));
        t.setAttribute('y', String(baseY + i * 14));
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#e0e0e0');
        t.setAttribute('font-size', '11'); t.setAttribute('font-weight', '500');
        t.textContent = line; g.appendChild(t);
      });
    } else {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', String(node.x + node.w / 2));
      t.setAttribute('y', String(node.y + (node.subtitle ? node.h / 2 - 4 : node.h / 2 + 4)));
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#e0e0e0');
      t.setAttribute('font-size', '12'); t.setAttribute('font-weight', '600');
      t.textContent = node.label; g.appendChild(t);
    }

    if (node.subtitle && lines.length <= 1) {
      const st = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      st.setAttribute('x', String(node.x + node.w / 2));
      st.setAttribute('y', String(node.y + node.h / 2 + 12));
      st.setAttribute('text-anchor', 'middle'); st.setAttribute('fill', '#8892a8');
      st.setAttribute('font-size', '9'); st.textContent = node.subtitle;
      g.appendChild(st);
    }

    // Badge
    if (node.type === 'new') {
      const br = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      br.setAttribute('x', String(node.x + node.w - 30)); br.setAttribute('y', String(node.y - 6));
      br.setAttribute('width', '30'); br.setAttribute('height', '14'); br.setAttribute('rx', '3');
      br.setAttribute('fill', '#30705a'); g.appendChild(br);
      const bt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      bt.setAttribute('x', String(node.x + node.w - 15)); bt.setAttribute('y', String(node.y + 5));
      bt.setAttribute('text-anchor', 'middle'); bt.setAttribute('fill', '#81c784');
      bt.setAttribute('font-size', '8'); bt.setAttribute('font-weight', '600');
      bt.textContent = 'NEW'; g.appendChild(bt);
    } else if (node.type === 'modified') {
      const br = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      br.setAttribute('x', String(node.x + node.w - 30)); br.setAttribute('y', String(node.y - 6));
      br.setAttribute('width', '30'); br.setAttribute('height', '14'); br.setAttribute('rx', '3');
      br.setAttribute('fill', '#6a6a30'); g.appendChild(br);
      const bt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      bt.setAttribute('x', String(node.x + node.w - 15)); bt.setAttribute('y', String(node.y + 5));
      bt.setAttribute('text-anchor', 'middle'); bt.setAttribute('fill', '#ffb74d');
      bt.setAttribute('font-size', '8'); bt.setAttribute('font-weight', '600');
      bt.textContent = 'MOD'; g.appendChild(bt);
    }

    svg.appendChild(g);
  }
}

function buildSidebar() {
  const data = SIDEBAR_DATA[state.approach];
  const sb = document.getElementById('sidebar');
  while (sb.firstChild) sb.removeChild(sb.firstChild);

  function addSection(title, contentFn) {
    const h = document.createElement('h3');
    h.textContent = title; sb.appendChild(h);
    contentFn();
  }

  addSection('Summary', function() {
    const box = document.createElement('div');
    box.className = 'summary-box';
    box.textContent = data.summary;
    sb.appendChild(box);
  });

  addSection('Legend \u2014 Nodes', function() {
    var items = [
      { bg: '#1a3028', border: '#30705a', label: 'New file' },
      { bg: '#2a2a18', border: '#6a6a30', label: 'Modified file' },
      { bg: '#1a2744', border: '#3a5070', label: 'Existing (unchanged)' },
      { bg: '#1e1a3a', border: '#5a4a8a', label: 'Lifecycle event' },
    ];
    items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'legend-item';
      var swatch = document.createElement('div');
      swatch.className = 'legend-node';
      swatch.style.background = item.bg;
      swatch.style.borderColor = item.border;
      row.appendChild(swatch);
      var lbl = document.createElement('span');
      lbl.textContent = item.label;
      row.appendChild(lbl);
      sb.appendChild(row);
    });
  });

  addSection('Legend \u2014 Connections', function() {
    var items = [
      { color: COLORS.direct, dashed: false, label: 'Direct call' },
      { color: COLORS.event, dashed: true, label: 'Event flow' },
      { color: COLORS.config, dashed: false, label: 'Config flow' },
      { color: COLORS.shell, dashed: false, label: 'Shell/stdin pipe' },
      { color: COLORS.existing, dashed: true, label: 'Existing pattern' },
    ];
    items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'legend-item';
      var swatch = document.createElement('div');
      swatch.className = 'legend-swatch' + (item.dashed ? ' dashed' : '');
      if (item.dashed) {
        swatch.style.setProperty('--swatch-color', item.color);
      } else {
        swatch.style.background = item.color;
      }
      row.appendChild(swatch);
      var lbl = document.createElement('span');
      lbl.textContent = item.label;
      row.appendChild(lbl);
      sb.appendChild(row);
    });
  });

  addSection(state.approach === 'current' ? 'Key Patterns' : 'Trade-offs', function() {
    var div = document.createElement('div');
    div.className = 'pro-con';
    data.pros.forEach(function(p) {
      var s = document.createElement('span');
      s.className = state.approach === 'current' ? 'note' : 'pro';
      s.textContent = state.approach === 'current' ? '\u2022 ' + p : p;
      div.appendChild(s);
    });
    data.cons.forEach(function(c) {
      var s = document.createElement('span');
      s.className = 'con'; s.textContent = c; div.appendChild(s);
    });
    sb.appendChild(div);
  });

  addSection('Files Changed', function() {
    var div = document.createElement('div');
    div.className = 'file-list';
    data.files.forEach(function(f) {
      var d = document.createElement('div');
      d.className = f.status;
      var prefix = f.status === 'new' ? '+ ' : f.status === 'modified' ? '~ ' : '  ';
      d.textContent = prefix + f.name;
      div.appendChild(d);
    });
    var info = document.createElement('div');
    info.style.cssText = 'margin-top:6px;color:var(--text-dim);font-size:11px';
    info.textContent = data.diffSize;
    div.appendChild(info);
    sb.appendChild(div);
  });
}

function updatePrompt() {
  var el = document.getElementById('prompt-text');
  if (state.approach === 'current') {
    el.textContent = 'Current architecture: AgentLoop orchestrates TelemetryClient, SessionLogger, MiddlewarePipeline, ToolManager. Events flow via act() async generator. No lifecycle hook extensibility exists today.';
  } else if (state.approach === 'direct') {
    el.textContent = 'Approach A: Implement HookManager following TelemetryClient pattern \u2014 standalone class, direct calls from AgentLoop at 5 lifecycle points. 1 new file, 2 modified. ~165 lines total.';
  } else {
    el.textContent = 'Approach B: Implement HookObserver on event stream \u2014 2 new event types, observer wrapper intercepts events and fires hooks. 1 new file, 5 modified. ~240 lines total. Warning: pre_tool_use timing issue, tool_input tracking needed.';
  }
}

function showTip(evt, node) {
  if (!node || !node.tip) return;
  var tt = document.getElementById('tooltip');
  while (tt.firstChild) tt.removeChild(tt.firstChild);

  var title = document.createElement('div');
  title.className = 'tt-title';
  title.textContent = node.label.replace('\n', ' ');
  tt.appendChild(title);

  if (node.subtitle) {
    var file = document.createElement('div');
    file.className = 'tt-file';
    file.textContent = node.subtitle;
    tt.appendChild(file);
  }

  var body = document.createElement('div');
  body.className = 'tt-body';
  body.textContent = node.tip;
  tt.appendChild(body);

  tt.style.display = 'block';
  var rect = tt.getBoundingClientRect();
  var x = evt.clientX + 12, y = evt.clientY - 10;
  if (x + rect.width > window.innerWidth - 10) x = evt.clientX - rect.width - 12;
  if (y + rect.height > window.innerHeight - 10) y = window.innerHeight - rect.height - 10;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}

function hideTip() {
  document.getElementById('tooltip').style.display = 'none';
}

function switchApproach(approach) {
  state.approach = approach;
  document.querySelectorAll('.approach-tab').forEach(function(tab) {
    tab.classList.toggle('active',
      (approach === 'current' && tab.textContent.indexOf('Current') >= 0) ||
      (approach === 'direct' && tab.textContent.indexOf('Telemetry') >= 0) ||
      (approach === 'event' && tab.textContent.indexOf('Event') >= 0));
  });
  renderAll();
}

function copyPrompt() {
  var text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy Prompt'; }, 1500);
  });
}

function renderAll() {
  var nodes, conns;
  if (state.approach === 'current') { nodes = CURRENT_NODES; conns = CURRENT_CONNS; }
  else if (state.approach === 'direct') { nodes = DIRECT_NODES; conns = DIRECT_CONNS; }
  else { nodes = EVENT_NODES; conns = EVENT_CONNS; }
  buildSVG(nodes, conns);
  buildSidebar();
  updatePrompt();
}

renderAll();
</script>
</body>
</html>
